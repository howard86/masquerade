name: Release

# Manual-only. After changes are merged to main, run this workflow from the
# Actions tab. release-please maintains a release PR (version bump + changelog
# from Conventional Commits); merge that PR, then run this workflow again to
# tag and publish the GitHub Release.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
