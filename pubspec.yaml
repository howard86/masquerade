name: masquerade
description: "A collection of utility tools and converters - your digital toolbox for everyday tasks."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.15.0+1

environment:
  sdk: ^3.10.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9
  intl: ^0.20.2
  package_info_plus: ^10.1.0
  shared_preferences: ^2.3.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  share_plus: ^13.1.0
  cross_file: ^0.3.4+2
  flutter_lucide: ^1.0.0
  # Renders assets/brand/*.svg in MqMonogram. SVG sources live with the
  # repo so the brand mark is editable + diffable; PNGs in
  # assets/brand/source/ are exports for native icon/splash pipelines.
  flutter_svg: ^2.0.10+1

  # Provides the runtime FlutterNativeSplash.preserve/remove API used in
  # main.dart + app.dart to hand off from the native splash to
  # MqSplashScreen. The :create generator (run-time-only command) lives
  # in the same package; we still invoke it via `dart run` locally.
  flutter_native_splash: ^2.4.6
  decimal: ^3.2.4
  rational: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Already a transitive dep of flutter_test; declared here so tests may
  # `import 'package:fake_async/fake_async.dart'` without violating pub rules.
  fake_async: ^1.3.1

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Asset generator — run-once, output committed. Sources are PNGs in
  # assets/brand/source/, themselves rasterized from
  # assets/brand/*.svg by scripts/build-brand-pngs.sh (requires librsvg).
  # Regenerate icons:  dart run flutter_launcher_icons
  # (flutter_native_splash is in dependencies because its runtime API
  # is used in main.dart; regenerate via `dart run flutter_native_splash:create`.)
  flutter_launcher_icons: ^0.14.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Cupertino-only app — see CLAUDE.md.
  uses-material-design: false

  assets:
    - assets/brand/

  fonts:
    - family: IBMPlexSerif
      fonts:
        - asset: assets/fonts/IBMPlexSerif-Regular.ttf
        - asset: assets/fonts/IBMPlexSerif-Italic.ttf
          style: italic
        - asset: assets/fonts/IBMPlexSerif-SemiBold.ttf
          weight: 600
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-VF.ttf
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Italic.ttf
          style: italic
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500

# iOS + web only per CLAUDE.md iOS-first stance. Sources are 1024×1024
# PNGs rasterized from assets/brand/*.svg.
flutter_launcher_icons:
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FAF7F2"
  image_path_ios: "assets/brand/source/monogram-light-1024.png"
  image_path_ios_dark_transparent: "assets/brand/source/monogram-dark-1024.png"
  web:
    generate: true
    image_path: "assets/brand/source/monogram-light-1024.png"
    background_color: "#FAF7F2"
    theme_color: "#8B2635"

# Native splash. Plugin emits a static frame; the Dart-side
# MqSplashScreen crossfades into RootTabScaffold once the engine boots.
flutter_native_splash:
  color: "#FAF7F2"
  color_dark: "#14110D"
  image: "assets/brand/source/splash-light.png"
  image_dark: "assets/brand/source/splash-dark.png"
  ios_content_mode: scaleAspectFit
  web_image_mode: contain
  android: false
  fullscreen: false
